<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About - The Pistols At Dawn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" />
</head>

<body>
<header>
    <div class="container-fluid">
    <nav class="navbar mt-4 p-2">
        <a  href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="listen.html">Listen</a>
        <a href="look.html">Look</a>
        <a href="equipment.html">Equipment</a>
        <a class = "nav-active" href="shows.html">Shows</a>
        <a href="contact.html">Contact</a>
    </nav>
    </div>
</header>

<main class="container-fluid home-page">
    <div class="home-about-content p-2">
    <h1 class="band-name page-title">Shows</h1>
        <p>The band encourages you to attend their upcoming performances.</p>
    </div>
</main>
 <script>
 document.addEventListener("DOMContentLoaded", () => {
 fetch('shows.json').then(res=>res.json()).then(shows=> {
    const container = document.querySelector('.home-about-content');
    shows.forEach(show => {
        const card = document.createElement('div');
        card.className = 'card mb-4 shadow';
        card.innerHTML = `
        <div class = "card-body">
            <h2 class = "card-title">${show.title}</h2>
            ${show.venue ? `<p><strong>Venue:</strong> ${show.venue}</p>`:''}
            ${show.program ? `<p><strong>Program:</strong> ${show.program}</p>`:''}
            <p><strong>Date:</strong> ${show.date}</p>
            <p><strong>Time:</strong> ${show.time}</p>
            <p>${show.description}</p>
        </div>
    `;
    container.appendChild(card);
    });
});
 });
 </script>
</body>
</html>
