<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shows - The Pistols At Dawn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" />
</head>

<body>
<header>
    <div class="container-fluid">
        <nav class="navbar mt-4 p-2">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="listen.html">Listen</a>
            <a href="look.html">Look</a>
            <a href="equipment.html">Equipment</a>
            <a class="nav-active" href="shows.html">Shows</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<main class="container-fluid home-page">
    <div class="home-about-content p-2">
        <h1 class="band-name page-title">Shows</h1>
        <p>Upcoming performances and appearances from The Pistols at Dawn.</p>

        <div class="card mb-4">
            <div class="card-body">
                <figure class="mb-0">
                    <img
                        class="img-fluid rounded mb-3"
                        src="images/may2flyer.jpeg"
                        alt="Flyer for The Pistols at Dawn 20 Year Anniversary Show at the Crystal Corner on May 2 with Compact Deluxe and Heart Strings"
                    >
                    <figcaption>
                        Poster for the 20 Year Anniversary Show at the Crystal Corner.
                    </figcaption>
                </figure>
            </div>
        </div>

        <div id="shows-container"></div>
    </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch("shows.json")
        .then(res => res.json())
        .then(shows => {
            const container = document.getElementById("shows-container");

            shows.forEach(show => {
                const card = document.createElement("div");
                card.className = "card mb-4 shadow";

                card.innerHTML = `
                    <div class="card-body">
                        <h2 class="card-title">${show.title}</h2>
                        ${show.venue ? `<p><strong>Venue:</strong> ${show.venue}</p>` : ""}
                        ${show.location ? `<p><strong>Location:</strong> ${show.location}</p>` : ""}
                        ${show.address ? `<p><strong>Address:</strong> ${show.address}</p>` : ""}
                        <p><strong>Date:</strong> ${show.date}</p>
                        <p><strong>Time:</strong> ${show.time}</p>
                        ${show.price ? `<p><strong>Price:</strong> ${show.price}</p>` : ""}
                        ${show.support ? `<p><strong>With:</strong> ${show.support}</p>` : ""}
                        <p>${show.description}</p>
                        ${show.link ? `<p><a href="${show.link}" target="_blank" rel="noopener noreferrer">View event details on Facebook</a></p>` : ""}
                    </div>
                `;

                container.appendChild(card);
            });
        });
});
</script>

</body>
</html>
